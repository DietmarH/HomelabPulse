name: pr-issue-link-validation

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check PR body contains issue reference
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          GH_ACTOR: ${{ github.actor }}
          GH_HEAD_REF: ${{ github.head_ref }}
        shell: bash
        run: |
          set -euo pipefail

          # Skip validation for Dependabot or automation branches to avoid blocking dependency updates
          if [ "${GH_ACTOR}" = "dependabot[bot]" ] || [[ "${GH_HEAD_REF}" == dependabot/* ]]; then
            echo "Skipping PR issue link validation for Dependabot/automation PR."
            exit 0
          fi

          # Check for common closing keywords followed by #<issue-number>
          if echo "${PR_BODY}" | grep -iE '(closes|closed|close|fixes|fixed|fix|resolves|resolved|resolve)[[:space:]]+#[0-9]+' > /dev/null; then
            echo "PR body contains a valid issue reference."
            exit 0
          fi

          echo "PR body does not contain a valid issue reference."
          echo "Please add 'Closes #<issue-number>' to your PR body."
          echo "Example: 'Closes #7' or 'Fixes #12'"
          exit 1
